name: CD Dev

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/dreyssechris/finance-tracker-api
  WEB_IMAGE: ghcr.io/dreyssechris/finance-tracker-web

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: src/
          file: src/FinanceTracker.Presentation/Dockerfile
          target: prod
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:dev
            ${{ env.API_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: src/financetracker-web
          file: src/financetracker-web/Dockerfile
          target: prod
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:dev
            ${{ env.WEB_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update dev kustomization with new image tags
        run: |
          cd deploy/k8s/overlays/dev
          # Update image tags to point to the new SHA
          sed -i "s|newTag: .*|newTag: sha-${{ github.sha }}|g" kustomization.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): update dev images to sha-${{ github.sha }}"
          git push
