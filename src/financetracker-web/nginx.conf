server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for all routes under /financetracker/
    location /financetracker/ {
        try_files $uri $uri/ /financetracker/index.html;
    }

    # Redirect /financetracker to /financetracker/
    location = /financetracker {
        return 301 /financetracker/;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
